name: Run Tests

on:
  pull_request:
    branches:
      - icp2

jobs:
  test:
    name: Run Ballerina Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run tests with Docker Compose
        run: |
          cd icp_server
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from icp-server-test

      - name: Get test results
        if: always()
        run: |
          cd icp_server
          docker compose -f docker-compose.test.yml logs icp-server-test

      - name: Clean up
        if: always()
        run: |
          cd icp_server
          docker compose -f docker-compose.test.yml down -v

