# Cipher Tool standalone configuration for WSO2 Integration Control Plane
# This file configures the Cipher Tool to work outside of a Carbon environment.
# All paths are relative to ICP_HOME.

# Primary keystore used for encrypting/decrypting secrets
# Uses the ICP keystore (PKCS12 format)
primary.key.location=conf/security/keystore.p12
primary.key.type=PKCS12
primary.key.alias=localhost

# Location of the cipher text properties file (stores encrypted values by alias)
cipher.text.properties.file=conf/security/cipher-text.properties

# Location of the cipher tool properties file (maps aliases to config property paths)
cipher.tool.properties.file=conf/security/cipher-tool.properties

# Location of the secret configuration properties file
secret.conf.properties.file=conf/security/secret-conf.properties
