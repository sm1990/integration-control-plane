# NOTE: This file is NOT used by the Cipher Tool when deployment.toml is present.
#
# The Cipher Tool has two modes:
#
# 1. TOML mode (active for ICP): When conf/deployment.toml exists, the tool reads
#    secrets directly from the [secrets] table in that file. This file is ignored.
#    To encrypt secrets, add a [secrets] section to conf/deployment.toml:
#
#      [secrets]
#      authBackendApiKey = "[plain-text-value]"
#      defaultJwtHMACSecret = "[plain-text-value]"
#      dbPassword = "[plain-text-value]"
#      ssoClientSecret = "[plain-text-value]"
#
#    Then run: ./bin/ciphertool.sh -Dconfigure
#    The tool encrypts each [plain-text-value] and rewrites it in deployment.toml.
#
# 2. Legacy XML mode: When deployment.toml does NOT exist, the tool uses this file
#    to map secret aliases to XPath locations in XML config files.
#    Format: <alias>=<config-file>//<xpath>,<isPasswordParam>
