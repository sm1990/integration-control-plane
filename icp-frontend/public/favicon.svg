<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connection lines -->
  <g opacity="0.6">
    <line x1="100" y1="100" x2="50" y2="50" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="150" y2="50" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="170" y2="100" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="150" y2="150" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="50" y2="150" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="30" y2="100" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Outer nodes -->
  <circle cx="50" cy="50" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  <circle cx="150" cy="50" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  <circle cx="170" cy="100" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  <circle cx="150" cy="150" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  <circle cx="50" cy="150" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  <circle cx="30" cy="100" r="12" fill="url(#lightGradient)" filter="url(#shadow)"/>
  
  <!-- Central hub node -->
  <circle cx="100" cy="100" r="22" fill="url(#blueGradient)" filter="url(#shadow)"/>
  
  <!-- Central hub icon - connection symbol -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="-10" r="2" fill="white"/>
    <circle cx="8.66" cy="5" r="2" fill="white"/>
    <circle cx="-8.66" cy="5" r="2" fill="white"/>
  </g>
  
  <!-- Small pulse circles on outer nodes -->
  <circle cx="50" cy="50" r="5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="50" r="5" fill="white" opacity="0.8"/>
  <circle cx="170" cy="100" r="5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="150" r="5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="150" r="5" fill="white" opacity="0.8"/>
  <circle cx="30" cy="100" r="5" fill="white" opacity="0.8"/>
</svg>