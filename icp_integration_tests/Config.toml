# Integration Test Configuration for ICP Server
# This configuration is used when running integration tests against a running ICP server

# =============================================================================
# ICP SERVER CONFIGURATION
# =============================================================================
# URL of the ICP server to test against
icpServerUrl = "https://localhost:9445"

# =============================================================================
# ADMIN CREDENTIALS
# =============================================================================
# Default admin credentials for testing
adminUsername = "admin"
adminPassword = "admin"

# =============================================================================
# SSL/TLS CONFIGURATION
# =============================================================================
# Path to truststore for SSL connections (relative to icp_server directory)
truststorePath = "../conf/security/ballerinaTruststore.p12"
truststorePassword = "ballerina"
