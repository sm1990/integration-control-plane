services:
  mssql-db:
    build:
      context: ./resources/db
      dockerfile: Dockerfile.mssql
    ports:
      - "1433:1433"
    container_name: icp-mssql-local
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_DB: icp_database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'SQLCMDPASSWORD="$$MSSQL_SA_PASSWORD" /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s
    # network_mode: host
