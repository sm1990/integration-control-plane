services:
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - "plugins.security.disabled=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -k -f -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=false"
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    volumes:
      - ./resources/observability/opensearch-observability-dashboard/config/dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    depends_on:
      opensearch:
        condition: service_healthy

  data-prepper:
    image: opensearchproject/data-prepper:latest
    container_name: data-prepper
    ports:
      - "4900:4900"
      - "4317:4317"
      - "8021:8021"
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    volumes:
      - data_prepper_config:/usr/share/data-prepper/pipelines
    depends_on:
      opensearch:
        condition: service_healthy
      envsubst-service:
        condition: service_healthy

  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    ports:
      - "2020:2020"
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    volumes:
      - ./resources/observability/opensearch-observability-dashboard/config/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./resources/observability/opensearch-observability-dashboard/config/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
      - ./resources/observability/opensearch-observability-dashboard/config/fluent-bit/scripts:/fluent-bit/scripts
      - ./resources/observability/opensearch-observability-dashboard/logs/ballerina:/var/log/ballerina:ro
      - ${MI_LOG_FILE_PATH}/${MI_LOG_FILE_NAME}:/var/log/mi/${MI_LOG_FILE_NAME}:ro
      # Persist position database
      - fluent-bit-db:/fluent-bit/db
      # Persist buffer storage
      - fluent-bit-buffer:/fluent-bit/buffer
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-setup:
        condition: service_completed_successfully

  envsubst-service:
    image: nginx:alpine
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    command: >
      /bin/sh -c "
      apk add --no-cache gettext &&
      envsubst < /templates/pipelines.yaml.template > /output/pipelines.yaml &&
      echo 'Template processing complete' &&
      sleep infinity
      "
    volumes:
      - ./resources/observability/opensearch-observability-dashboard/config/data-prepper/pipelines.yaml.template:/templates/pipelines.yaml.template
      - data_prepper_config:/output
    healthcheck:
      test: ["CMD", "test", "-s", "/output/pipelines.yaml"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: no

  opensearch-setup:
    image: curlimages/curl:latest
    container_name: opensearch-setup
    env_file:
      - ./resources/observability/opensearch-observability-dashboard/config/.env
    volumes:
      - ./resources/observability/opensearch-observability-dashboard/setup:/setup
    depends_on:
      opensearch-dashboards:
        condition: service_started
    command: >
      sh -c "
        echo 'Waiting for OpenSearch to be ready...' &&
        until curl -ku admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD https://opensearch:9200/_cluster/health; do
          echo 'Waiting for OpenSearch...' &&
          sleep 10
        done &&

        echo 'Creating index templates...' &&
        curl -X PUT 'https://opensearch:9200/_index_template/wso2_integration_application_log_template' -ku admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD -H 'Content-Type: application/json' -d @/setup/index-template-request.json &&

        echo 'Waiting for OpenSearch Dashboards to be ready...' &&
        until curl -f -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD http://opensearch-dashboards:5601/api/status; do
          echo 'Waiting for OpenSearch Dashboards...' &&
          sleep 10
        done &&

        echo 'Importing dashboards...' &&
        curl -X POST 'http://opensearch-dashboards:5601/api/saved_objects/_import' -ku admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD -H 'osd-xsrf: true' -F file=@/setup/opensearch-dashboards-template.ndjson &&

        echo 'Setup completed successfully!'
      "

volumes:
  opensearch_data:
  data_prepper_config:
  fluent-bit-db:
  # Size constrained by Fluent Bit storage.total_limit_size (500M) in fluent-bit.conf
  fluent-bit-buffer:
