services:
  postgresql-db:
    build:
      context: ./resources/db
      dockerfile: Dockerfile.postgresql
    ports:
      - "5432:5432"
    container_name: icp-postgresql-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my-secret-pw
      POSTGRES_DB: icp_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d icp_database"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
