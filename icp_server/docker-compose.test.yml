services:
    mysql-db:
        build:
            context: ./resources/db
            dockerfile: Dockerfile
        ports:
            - "3307:3306"
        container_name: icp-mysql-test
        environment:
            MYSQL_ROOT_PASSWORD: my-secret-pw
            MYSQL_DATABASE: icp_database
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 40s
    icp-server-test:
        image: wso2/icp_server
        container_name: icp-server-test
        build: 
            context: ..
            dockerfile: ./icp_server/build.Dockerfile
        depends_on:
            mysql-db:
                condition: service_healthy
        command: bal test

