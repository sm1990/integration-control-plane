[SERVICE]
   Flush         1
   Log_Level     info
   Daemon        off
   Parsers_File  parsers.conf
   HTTP_Server   On
   HTTP_Listen   0.0.0.0
   HTTP_Port     2020
   # Persistent storage path
   storage.path              /fluent-bit/buffer
   storage.sync              normal
   storage.checksum          off
   storage.max_chunks_up     128
   storage.backlog.mem_limit 5M
   # Hard limit on total disk usage for buffered data (prevents volume from filling)
   storage.total_limit_size  100M

# Input from Ballerina log files
[INPUT]
   Name              tail
   Path              /var/log/ballerina/*/app.log
   Parser            bal_logfmt_parser
   Tag               ballerina.*
   Refresh_Interval  5
   Mem_Buf_Limit     256MB
   Skip_Long_Lines   On
   Read_from_Head    On
   Path_Key          log_file_path

# Input from Micro Integrator log files
[INPUT]
   Name              tail
   Path              /var/log/mi/*.log
   Tag               mi.*
   multiline.parser  mi_multiline
   Refresh_Interval  5
   Mem_Buf_Limit     256MB
   Skip_Long_Lines   On
   Read_from_Head    On
   Path_Key          log_file_path

# Add application name from file path - For Ballerina logs
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    extract_app_from_path

# ========== BALLERINA LOG PROCESSING ==========

# Enrich all Ballerina logs with common fields
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    enrich_bal_logs

# Construct Ballerina app names
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    construct_bal_app_name

# First: Separate Ballerina metrics logs (those with logger="metrics")
[FILTER]
   Name rewrite_tag
   Match ballerina.*
   Rule $logger ^metrics$ ballerina_metrics false
   Emitter_Name re_emitted_bal_metrics

# Second: Route remaining ballerina logs to application logs
# This catches all ballerina.* logs that weren't retagged as metrics
[FILTER]
   Name rewrite_tag
   Match ballerina.*
   Rule $module .* ballerina_app_logs false
   Emitter_Name re_emitted_bal_app_logs

# Process Ballerina metrics
[FILTER]
   Name    lua
   Match   ballerina_metrics
   Script  /fluent-bit/scripts/scripts.lua
   Call    extract_bal_metrics_data

# ========== MICRO INTEGRATOR LOG PROCESSING ==========

# Parse MI logs using regex parser
[FILTER]
   Name    parser
   Match   mi.*
   Key_Name log
   Parser  mi_log_parser
   Reserve_Data On

# Enrich all MI logs with common fields
[FILTER]
   Name    lua
   Match   mi.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    enrich_mi_logs

# This catches all mi.* logs
[FILTER]
   Name rewrite_tag
   Match mi.*
   Rule $service_type ^MI$ mi_app_logs false
   Emitter_Name re_emitted_mi_app_logs

# Ballerina Application Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix ballerina-application-logs
   Match ballerina_app_logs
   Buffer_Size 2M
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   tls On
   tls.verify Off
   Trace_Error On

# Ballerina Metrics Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix ballerina-metrics-logs
   Match ballerina_metrics
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   tls On
   tls.verify Off
   Trace_Error On

# Micro Integrator Application Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix mi-application-logs
   Match mi_app_logs
   Buffer_Size 2M
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   tls On
   tls.verify Off
   Trace_Error On

# Fallback for any unmatched logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix general-logs
   Match_regex ^(mi|wso2apim).*
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   tls On
   tls.verify Off
   Trace_Error On
