[SERVICE]
   Flush                     1
   Log_Level                 info
   Daemon                    off
   Parsers_File              parsers.conf
   HTTP_Server               On
   HTTP_Listen               0.0.0.0
   HTTP_Port                 2020
   # Persistent storage path
   storage.path              /fluent-bit/buffer
   storage.sync              normal
   storage.checksum          off
   storage.max_chunks_up     128
   storage.backlog.mem_limit 5M
   # Hard limit on total disk usage for buffered data (prevents volume from filling)
   storage.total_limit_size  100M

# Input from Ballerina log files
[INPUT]
   Name              tail
   Path              /var/log/ballerina/*/app.log
   Parser            bal_logfmt_parser
   Tag               ballerina.*
   # Position tracking database (persistent)
   DB                /fluent-bit/db/tail-ballerina.db
   DB.locking        true
   DB.journal_mode   WAL
   # File rotation handling
   Refresh_Interval  5
   Ignore_Older      2h
   # Buffer settings
   Mem_Buf_Limit     256MB
   Skip_Long_Lines   On
   Read_from_Head    On
   Path_Key          log_file_path

# Input from Micro Integrator log files
[INPUT]
   Name                tail
   Path                /var/log/mi/${MI_LOG_FILE_NAME}
   Tag                 mi.*
   # Multiline handling
   multiline.parser    mi_multiline
   # Position tracking database (persistent)
   DB                  /fluent-bit/db/tail-mi.db
   DB.locking          true
   DB.journal_mode     WAL
   # File rotation handling
   Refresh_Interval    5
   Ignore_Older        2h
   # Buffer settings
   Buffer_Chunk_Size   512KB
   Buffer_Max_Size     2MB
   Mem_Buf_Limit       256MB
   Skip_Long_Lines     On
   Read_from_Head      On
   Path_Key            log_file_path

# Input from MI analytics log files (synapse-analytics.log)
# Reads structured analytics events written by the Synapse analytics publisher
[INPUT]
   Name              tail
   Path              /var/log/mi/${MI_ANALYTICS_LOG_FILE_NAME}
   Tag               mi_metrics
   # Position tracking database (persistent)
   DB                /fluent-bit/db/tail-mi-metrics.db
   DB.locking        true
   DB.journal_mode   WAL
   # File rotation handling
   Refresh_Interval  5
   Ignore_Older      2h
   # Buffer settings
   Buffer_Chunk_Size 512KB
   Buffer_Max_Size   2MB
   Mem_Buf_Limit     256MB
   Skip_Long_Lines   On
   Read_from_Head    On

# Add application name from file path - For Ballerina logs
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    extract_app_from_path

# ========== BALLERINA LOG PROCESSING ==========

# Enrich all Ballerina logs with common fields
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    enrich_bal_logs

# Construct Ballerina app names
[FILTER]
   Name    lua
   Match   ballerina.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    construct_bal_app_name

# First: Separate Ballerina metrics logs (those with logger="metrics")
[FILTER]
   Name rewrite_tag
   Match ballerina.*
   Rule $logger ^metrics$ ballerina_metrics false
   Emitter_Name re_emitted_bal_metrics

# Second: Route remaining ballerina logs to application logs
# This catches all ballerina.* logs that weren't retagged as metrics
[FILTER]
   Name rewrite_tag
   Match ballerina.*
   Rule $module .* ballerina_app_logs false
   Emitter_Name re_emitted_bal_app_logs

# Process Ballerina metrics
[FILTER]
   Name    lua
   Match   ballerina_metrics
   Script  /fluent-bit/scripts/scripts.lua
   Call    extract_bal_metrics_data

# ========== MICRO INTEGRATOR LOG PROCESSING ==========

# Parse MI logs using regex parser
[FILTER]
   Name         parser
   Match        mi.*
   Key_Name     log
   Parser       mi_log_parser
   Reserve_Data On

# Enrich all MI logs with common fields
[FILTER]
   Name    lua
   Match   mi.*
   Script  /fluent-bit/scripts/scripts.lua
   Call    enrich_mi_logs

# This catches all mi.* logs
[FILTER]
   Name rewrite_tag
   Match mi.*
   Rule $service_type ^MI$ mi_app_logs false
   Emitter_Name re_emitted_mi_app_logs

# ========== MI ANALYTICS LOG PROCESSING ==========

# Only keep log lines that contain the analytics prefix written by Synapse
[FILTER]
   Name  grep
   Match mi_metrics
   Regex log SYNAPSE_ANALYTICS_DATA

# Step 1: Extract the raw JSON string from the log line
[FILTER]
   Name         parser
   Match        mi_metrics
   Key_Name     log
   Parser       mi_metrics_json_extract
   Reserve_Data Off

# Step 2: Parse the extracted JSON string into structured fields
[FILTER]
   Name         parser
   Match        mi_metrics
   Key_Name     json_str
   Parser       mi_metrics_parse_json
   Reserve_Data Off

# Enrich MI metrics records with common metadata
[FILTER]
   Name   lua
   Match  mi_metrics
   Script /fluent-bit/scripts/scripts.lua
   Call   enrich_mi_metrics

# Route metrics records to a dedicated tag
[FILTER]
   Name         rewrite_tag
   Match        mi_metrics
   Rule         $log_type ^metrics$ mi_metrics_logs false
   Emitter_Name re_emitted_mi_metrics

# ========== DOCUMENT ID GENERATION ==========
# Generate document IDs for deduplication

# Generate IDs for Ballerina application logs
[FILTER]
   Name    lua
   Match   ballerina_app_logs
   Script  /fluent-bit/scripts/scripts.lua
   Call    generate_document_id
   time_as_table true

# Generate IDs for Ballerina metrics logs
[FILTER]
   Name    lua
   Match   ballerina_metrics
   Script  /fluent-bit/scripts/scripts.lua
   Call    generate_document_id
   time_as_table true

# Generate IDs for MI application logs
[FILTER]
   Name    lua
   Match   mi_app_logs
   Script  /fluent-bit/scripts/scripts.lua
   Call    generate_document_id
   time_as_table true

# Generate IDs for MI metrics logs
[FILTER]
   Name    lua
   Match   mi_metrics_logs
   Script  /fluent-bit/scripts/scripts.lua
   Call    generate_mi_metrics_document_id
   time_as_table true

# Ballerina Application Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix ballerina-application-logs
   Match ballerina_app_logs
   Buffer_Size 2M
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   Id_Key doc_id
   tls On
   tls.verify Off
   Trace_Error On

# Ballerina Metrics Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix ballerina-metrics-logs
   Match ballerina_metrics
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   Id_Key doc_id
   tls On
   tls.verify Off
   Trace_Error On

# Micro Integrator Application Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix mi-application-logs
   Match mi_app_logs
   Buffer_Size 2M
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   Id_Key doc_id
   tls On
   tls.verify Off
   Trace_Error On

# MI Metrics Logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix mi-metrics-logs
   Match mi_metrics_logs
   Buffer_Size 2M
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   Id_Key doc_id
   tls On
   tls.verify Off
   Trace_Error On

# Fallback for any unmatched logs
[OUTPUT]
   Name opensearch
   Host opensearch
   HTTP_User admin
   HTTP_Passwd ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
   Logstash_Format On
   Logstash_DateFormat %Y-%m-%d
   Logstash_Prefix general-logs
   Match_regex ^(mi|wso2apim).*
   Port 9200
   Replace_Dots On
   Suppress_Type_Name On
   tls On
   tls.verify Off
   Trace_Error On
