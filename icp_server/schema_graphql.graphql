# ============================================
# Query Type - Read Operations
# ============================================
type Query {
  # Runtime Queries
  runtimes(status: String, runtimeType: String, environmentId: String, projectId: String, componentId: String): [Runtime!]!
  runtime(runtimeId: String!): Runtime
  services(runtimeId: String!): [Service!]!
  listeners(runtimeId: String!): [Listener!]!

  # Environment Queries
  environments: [Environment!]!
  adminEnvironments: [Environment!]!

  # Project Queries
  projects(orgId: Int): [Project!]!
  adminProjects: [Project!]!
  project(orgId: Int, projectId: String!): Project
  projectCreationEligibility(orgId: Int!, orgHandler: String!): ProjectCreationEligibility!
  projectHandlerAvailability(orgId: Int!, projectHandlerCandidate: String!): ProjectHandlerAvailability!

  # Component Queries
  components(orgHandler: String!, projectId: String, options: ComponentOptionsInput): [Component!]!
  component(componentId: String!): Component
}

# ============================================
# Mutation Type - Write Operations
# ============================================
type Mutation {
  # Runtime Mutations
  deleteRuntime(runtimeId: String!): Boolean!

  # Environment Mutations
  createEnvironment(environment: EnvironmentInput!): Environment
  deleteEnvironment(environmentId: String!): Boolean!
  updateEnvironment(environmentId: String!, name: String, description: String): Environment
  updateEnvironmentProductionStatus(environmentId: String!, isProduction: Boolean!): Environment

  # Project Mutations
  createProject(project: ProjectInput!): Project
  deleteProject(projectId: String!): Boolean!
  updateProject(projectId: String!, name: String, description: String): Project

  # Component Mutations
  createComponent(component: ComponentInput!): Component
  deleteComponent(componentId: String!): Boolean!
  updateComponent(componentId: String!, name: String, description: String): Component!
}

# ============================================
# Runtime Type - Runtime Instance Details
# ============================================
type Runtime {
  runtimeId: String!
  runtimeType: String!
  status: String!
  version: String
  component: Component!
  environment: Environment!
  platformName: String
  platformVersion: String
  platformHome: String
  osName: String
  osVersion: String
  registrationTime: String
  lastHeartbeat: String
  artifacts: Artifacts
}

# ============================================
# Artifacts Type - Runtime Artifacts Container
# ============================================
type Artifacts {
  listeners: [Listener!]!
  services: [Service!]!
}

# ============================================
# Service Type - Service Artifacts
# ============================================
type Service {
  name: String!
  package: String!
  basePath: String!
  state: ArtifactState!
  resources: [Resource!]!
}

# ============================================
# Listener Type - Listener Artifacts
# ============================================
type Listener {
  name: String!
  package: String!
  protocol: String!
  state: ArtifactState!
}

# ============================================
# Resource Type - Service Resources
# ============================================
type Resource {
  methods: [String!]!
  url: String!
}

# ============================================
# ArtifactState Enum - Artifact Status
# ============================================
enum ArtifactState {
  FAILED
  STOPPING
  STARTING
  DISABLED
  ENABLED
}

# ============================================
# Component Type - Application Component
# ============================================
type Component {
  # Basic Identity Fields
  id: String!
  projectId: String!
  orgHandler: String!
  orgId: Int

  # Component Metadata
  name: String!
  handler: String!
  displayName: String!
  displayType: String!
  description: String

  # Status Fields
  status: String!
  initStatus: String

  # Version & Timestamps
  version: String!
  createdAt: String!
  lastBuildDate: String
  updatedAt: String

  # Classification
  componentSubType: String
  componentType: String
  labels: String

  # System Component Flag
  isSystemComponent: Boolean

  # Nested Objects
  repository: Repository
  apiVersions: [ApiVersion!]
  deploymentTracks: [DeploymentTrack!]

  # Git Integration (for components with source control)
  gitProvider: String
  gitOrganization: String
  gitRepository: String
  branch: String

  # Advanced Fields (used in specific views)
  endpoints: [Endpoint!]
  environmentVariables: [EnvironmentVariable!]
  secrets: [Secret!]

  # Legacy fields for backward compatibility
  createdBy: String
  updatedBy: String
  componentId: String
  project: Project
}

# ============================================
# Project Type - Project Details
# ============================================
type Project {
  id: String!
  projectId: String!
  orgId: Int!
  name: String!
  version: String
  createdDate: String
  handler: String!
  extendedHandler: String
  region: String
  description: String
  owner: String
  labels: [String!]
  defaultDeploymentPipelineId: String
  deploymentPipelineIds: [String!]
  type: String
  gitProvider: String
  gitOrganization: String
  repository: String
  branch: String
  secretRef: String
  createdBy: String
  updatedAt: String
  updatedBy: String
}

# ============================================
# Environment Type - Deployment Environment
# ============================================
type Environment {
  environmentId: String!
  name: String!
  description: String
  isProduction: Boolean!
  createdAt: String
  updatedAt: String
  updatedBy: String
  createdBy: String
}

type Artifacts {
  listeners: [Listener!]!
  services: [Service!]!
}

type Listener {
  name: String!
  package: String!
  protocol: String!
  state: ArtifactState!
}

enum ArtifactState {
  FAILED
  STOPPING
  STARTING
  DISABLED
  ENABLED
}

type Service {
  name: String!
  package: String!
  basePath: String!
  state: ArtifactState!
  resources: [Resource!]!
}

type Resource {
  methods: [String!]!
  url: String!
}

type Mutation {
  deleteRuntime(runtimeId: String!): Boolean!
  createEnvironment(environment: EnvironmentInput!): Environment
  deleteEnvironment(environmentId: String!): Boolean!
  updateEnvironment(environmentId: String!, name: String, description: String): Environment
  updateEnvironmentProductionStatus(environmentId: String!, isProduction: Boolean!): Environment
  createProject(project: ProjectInput!): Project
  deleteProject(orgId: Int!, projectId: String!): DeleteResponse!
  updateProject(project: ProjectUpdateInput!): Project
  createComponent(component: ComponentInput!): Component
  deleteComponent(componentId: String!): Boolean!
  updateComponent(componentId: String!, name: String, description: String): Component!
}

input EnvironmentInput {
  name: String!
  description: String
  isProduction: Boolean
}

input ProjectInput {
  orgId: Int!
  orgHandler: String!
  name: String!
  version: String
  projectHandler: String!
  handler: String
  region: String
  description: String
  defaultDeploymentPipelineId: String
  deploymentPipelineIds: [String!]
  type: String
  gitProvider: String
  gitOrganization: String
  repository: String
  branch: String
  secretRef: String
}

input ProjectUpdateInput {
  id: String!
  orgId: Int
  name: String
  version: String
  description: String
}

input ComponentInput {
  projectId: String!
  name: String!
  description: String
}

# ============================================
# Repository Type - Build & Deploy Configuration
# ============================================
type Repository {
  # Buildpack Configuration (for source-based components)
  buildpackConfig: BuildpackConfig

  # BYOC (Bring Your Own Container) Configuration
  byocWebAppBuildConfig: ByocWebAppBuildConfig

  # Docker Configuration (alternative to BYOC)
  dockerBuildConfig: DockerBuildConfig

  # Repository Source Information
  repositoryType: String
  repositoryBranch: String
  repositorySubPath: String
  repositoryUrl: String

  # Build Settings
  buildContext: String
  dockerContext: String
}

# ============================================
# Buildpack Configuration
# ============================================
type BuildpackConfig {
  versionId: String
  buildContext: String
  languageVersion: String
  buildCommand: String
  runCommand: String
  buildpack: Buildpack
}

type Buildpack {
  id: String!
  name: String
  language: String!
  version: String
  description: String
}

# ============================================
# BYOC Web App Build Configuration
# ============================================
type ByocWebAppBuildConfig {
  id: String
  dockerContext: String
  webAppType: String
  port: Int
  imageUrl: String
  registryId: String
  dockerfile: String
}

# ============================================
# Docker Build Configuration
# ============================================
type DockerBuildConfig {
  id: String
  dockerContext: String
  dockerfile: String
  port: Int
  imageUrl: String
  registryId: String
}

# ============================================
# API Version Type - API Management
# ============================================
type ApiVersion {
  # Identity
  id: String!
  apiVersion: String!

  # Proxy Configuration
  proxyName: String
  proxyUrl: String
  proxyId: String

  # State Management
  state: String!
  latest: Boolean!

  # Git Integration
  branch: String

  # Access Control
  accessibility: String

  # Deployment Settings
  autoDeployEnabled: Boolean

  # Observability
  cellDiagram: CellDiagram

  # API Specification
  openApiSpec: String
  graphqlSchema: String

  # Metadata
  createdAt: String
  updatedAt: String
  description: String
}

# ============================================
# Cell Diagram - Observability & Architecture View
# ============================================
type CellDiagram {
  data: String
  message: String
  errorName: String
  success: Boolean!
}

# ============================================
# Deployment Track Type - CI/CD Configuration
# ============================================
type DeploymentTrack {
  # Identity
  id: String!
  componentId: String!

  # Timestamps
  createdAt: String!
  updatedAt: String!

  # Version Configuration
  apiVersion: String!
  branch: String
  latest: Boolean!
  versionStrategy: String

  # Deployment Settings
  description: String
  autoDeployEnabled: Boolean
  autoBuildEnabled: Boolean

  # Environment Settings
  environmentName: String
  environmentId: String

  # Deployment Status
  deploymentStatus: String
  lastDeployedAt: String
}

# ============================================
# Endpoint Type - Service Endpoints
# ============================================
type Endpoint {
  id: String!
  componentId: String!
  name: String!
  url: String!
  type: String!
  protocol: String
  port: Int
  visibility: String
}

# ============================================
# Environment Variable Type
# ============================================
type EnvironmentVariable {
  key: String!
  value: String
  isSecret: Boolean!
  description: String
}

# ============================================
# Secret Type
# ============================================
type Secret {
  key: String!
  description: String
  createdAt: String
  updatedAt: String
}

# ============================================
# Input Types for Mutations
# ============================================

# Environment Input
input EnvironmentInput {
  name: String!
  description: String
  isProduction: Boolean
}

# Project Input
input ProjectInput {
  orgId: Int!
  orgHandler: String!
  name: String!
  version: String
  projectHandler: String!
  handler: String
  region: String
  description: String
  defaultDeploymentPipelineId: String
  deploymentPipelineIds: [String!]
  type: String
  gitProvider: String
  gitOrganization: String
  repository: String
  branch: String
  secretRef: String
}

# Component Input
input ComponentInput {
  # Required Fields
  projectId: String!
  name: String!

  # Recommended Fields
  displayName: String
  description: String

  # Organization Context (optional - can derive from projectId)
  orgId: Int
  orgHandler: String

  # Component Classification (optional - can have defaults)
  componentType: String
  technology: String

  # Repository Integration (optional - for future use)
  repository: String
  branch: String
  directoryPath: String
  secretRef: String
  isPublicRepo: Boolean
}

# ============================================
# Input Types for Queries
# ============================================

# Component Filter Input
input ComponentFilterInput {
  withSystemComponents: Boolean
  displayType: String
  status: String
  componentSubType: String
}

# Component Sort Input
input ComponentSortInput {
  field: String!
  order: String!
}

# Pagination Input
input PaginationInput {
  limit: Int
  offset: Int
  cursor: String
}

# Component Options Input
input ComponentOptionsInput {
  filter: ComponentFilterInput
  sort: ComponentSortInput
  pagination: PaginationInput
}

# ============================================
# Project Creation Eligibility Type
# ============================================
type ProjectCreationEligibility {
  isProjectCreationAllowed: Boolean!
}

# ============================================
# Project Handler Availability Type
# ============================================
type ProjectHandlerAvailability {
  handlerUnique: Boolean!
  alternateHandlerCandidate: String
}

# ============================================
# Delete Response Type
# ============================================
type DeleteResponse {
  status: String!
  details: String!
}
