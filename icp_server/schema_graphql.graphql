# ============================================
# Component Type - Application Component
# ============================================
type Component {
  # Basic Identity Fields
  id: String!
  projectId: String!
  orgHandler: String!
  orgId: Int

  # Component Metadata
  name: String!
  handler: String!
  displayName: String!
  displayType: String!
  description: String
  ownerName: String

  # Status Fields
  status: String!
  initStatus: String

  # Version & Timestamps
  version: String!
  createdAt: String!
  lastBuildDate: String
  updatedAt: String

  # Classification
  componentSubType: String
  componentType: RuntimeType!
  labels: String

  # System Component Flag
  isSystemComponent: Boolean

  # Component Configuration Flags
  apiId: String
  httpBased: Boolean
  isMigrationCompleted: Boolean
  skipDeploy: Boolean
  endpointShortUrlEnabled: Boolean
  isUnifiedConfigMapping: Boolean
  serviceAccessMode: String

  # Nested Objects
  repository: Repository
  apiVersions: [ApiVersion!]
  deploymentTracks: [DeploymentTrack!]

  # Git Integration (for components with source control)
  gitProvider: String
  gitOrganization: String
  gitRepository: String
  branch: String

  # Advanced Fields (used in specific views)
  endpoints: [Endpoint!]
  environmentVariables: [EnvironmentVariable!]
  secrets: [Secret!]

  # Legacy fields for backward compatibility
  createdBy: String
  updatedBy: String
  componentId: String
  project: Project
}

