# ============================================
# Input Types for Mutations
# ============================================

# Environment Input
input EnvironmentInput {
  name: String!
  description: String
  isProduction: Boolean
}

# Project Input
input ProjectInput {
  orgId: Int!
  orgHandler: String!
  name: String!
  version: String
  projectHandler: String!
  handler: String
  region: String
  description: String
  defaultDeploymentPipelineId: String
  deploymentPipelineIds: [String!]
  type: String
  gitProvider: String
  gitOrganization: String
  repository: String
  branch: String
  secretRef: String
}

# Component Input
input ComponentInput {
  # Required Fields
  projectId: String!
  name: String!

  # Recommended Fields
  displayName: String
  description: String

  # Organization Context (optional - can derive from projectId)
  orgId: Int
  orgHandler: String

  # Component Classification (optional - can have defaults)
  componentType: RuntimeType
  technology: String

  # Repository Integration (optional - for future use)
  repository: String
  branch: String
  directoryPath: String
  secretRef: String
  isPublicRepo: Boolean
}

# Project Update Input
input ProjectUpdateInput {
  id: String!
  orgId: Int
  name: String
  version: String
  description: String
}

# Component Update Input
input ComponentUpdateInput {
  # Required field - component ID to update
  id: String!

  # Basic fields that can be updated
  name: String
  displayName: String
  description: String
  componentType: RuntimeType
  version: String
  labels: String
  serviceAccessMode: String

  # Extended fields (accepted for compatibility but may not be persisted)
  apiId: String
  httpBased: Boolean
  isMigrationCompleted: Boolean
  skipDeploy: Boolean
  endpointShortUrlEnabled: Boolean
  isUnifiedConfigMapping: Boolean
  componentSubType: String
}

# ============================================
