apiVersion: apps/v1
kind: Deployment
metadata:
  name: icp-deployment
  labels:
    app: icp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: icp
  template:
    metadata:
      labels:
        app: icp
    spec:
      containers:
        - name: icp-container
          image: wso2icp:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9445
              name: https
            - containerPort: 9446
              name: graphql
            - containerPort: 9448
              name: observability
            - containerPort: 9449
              name: opensearch
